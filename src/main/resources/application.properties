spring.application.name=planillaje-vehicular

# Variables de entorno con valores por defecto (por si corres la app fuera de Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/planillaje_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}

# FORZAR el driver de PostgreSQL (Esto quita el error de MySQL)
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8082}

# -------------------- CONFIGURACI”N PARA EVITAR DEMORAS EN RENDER --------------------
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Logs para ver quÈ est· pasando (puedes quitarlos despuÈs)
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.security=DEBUG