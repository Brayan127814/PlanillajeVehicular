version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: db-planillaje
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: app-planillaje
    ports:
      - "${APP_PORT}:8082"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8082


  frontend:
    build:
      context: "C:/Java/planillaje-vehicular-f/planillaje-vehicular"
      dockerfile: Dockerfile
    container_name: angular-planillaje
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - app

volumes:
  postgres_data: